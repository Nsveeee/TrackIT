{% extends "base.html" %}

{% block title %}Login · TrackIT{% endblock %}
{% block body %}
  <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;">
    <h1 style="margin-bottom:24px;font-size:32px;font-weight:800;letter-spacing:0.03em;">TrackIT</h1>

    <section class="auth-card">
      <h1 style="text-align:center;margin-bottom:4px;">Login</h1>
      <p class="sub" style="text-align:center;margin-bottom:18px;">Sign in to continue.</p>
      {% if error %}
        <div class="pill" style="justify-content:center;width:100%;border-color:rgba(239,68,68,.35);color:#ef4444;background:rgba(239,68,68,.08);margin-bottom:12px;">
          {{ error }}
        </div>
      {% endif %}

      <form method="POST">
        {% csrf_token %}

        <div class="field">
          <div class="label">Username</div>
          <div class="control">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M20 21a8 8 0 0 0-16 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M12 13a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <input name="username" autocomplete="username" placeholder="Enter your username" required>
          </div>
        </div>

        <div class="field">
          <div class="label">Password</div>
          <div class="control">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M7 11V8a5 5 0 0 1 10 0v3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M6 11h12v9H6v-9Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <input name="password" type="password" autocomplete="current-password" placeholder="Enter your password" required>
          </div>
        </div>

        <div class="field">
          <div class="label">Login as</div>
          <div class="control">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M4 20a8 8 0 0 1 16 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <select name="role" aria-label="Login as" style="border:0;outline:none;width:100%;background:transparent;font-size:14px;">
              <option value="ADMIN">Admin</option>
              <option value="DEV">Developer</option>
              <option value="REPORTER" selected>Reporter</option>
            </select>
          </div>
        </div>

        <button class="btn" type="submit" style="margin-top:10px;">Login</button>
      </form>
    </section>
  </div>
{% endblock %}
